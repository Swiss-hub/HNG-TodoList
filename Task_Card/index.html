<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Card</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="page">
        <article class="card" data-testid="test-todo-card" aria-label="Todo item">
            <header class="card-header">
                <div class="title-row">
                    <div class="complete">
                        <input id="todo-complete" type="checkbox" data-testid="test-todo-complete-toggle"/>
                        <label for="todo-complete">Mark Complete</label>
                    </div>

                    <div class="badges">
                        <span class="badge badge--priority" data-testid="test-todo-priority" aria-label="Priority">
                            High
                        </span>
                        <span class="badge badge--status" data-testid="test-todo-status" aria-label="status">
                            In Progress
                        </span>
                    </div>
                </div>
                <h2 class="title" data-testid="test-todo-title">Design review for landing page</h2>
            </header>

            <p class="description" data-testid="test-todo-description">
                My Final Submission on spacing, typography, and mobile layout. Making sure there's focus states and ensuring no horizontal overflow at 320px.
            </p>

            <section class="meta" aria-label="Due date">
                <time class="due" data-testid="test-todo-due-date"></time>
                <time class="remaining" data-testid="test-todo-time-remaining" aria-live="polite"></time>
            </section>

            <section class="tags" aria-label="Tags">
                <div class="tags__label">Tags</div>
                <ul class="tag-list" role="list" data-testid="test-todo-tags">
                    <li class="chip" data-testid="test-todo-tag-work">work</li>
                    <li class="chip" data-testid="test-todo-tag-urgent">urgent</li>
                    <li class="chip">design</li>
                </ul>
            </section>

            <footer class="actions" aria-label="Actions">
                <button type="button" class="btn btn--ghost" data-testid="test-todo-edit-button">
                    Edit
                </button>
                <button type="button" class="btn btn--danger" data-testid="test-todo-delete-button">
                    Delete
                </button>
            </footer>
        </article>
    </main>

    <script src="main.js"></script>
</body>
</html>
